# Deploy docs to Cloudflare Pages on push to master.
#
# Prerequisites:
#   1. Create a Cloudflare Pages project named "tiportfolio-docs"
#      (via dashboard or: npx wrangler pages project create tiportfolio-docs)
#   2. Add these GitHub repo secrets:
#      - CLOUDFLARE_API_TOKEN: API token with "Cloudflare Pages:Edit" permission
#      - CLOUDFLARE_ACCOUNT_ID: Your Cloudflare account ID
#
# Docs will be available at: https://tiportfolio-docs.pages.dev

name: Deploy Docs

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build docs
        run: uv run python -m mkdocs build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tiportfolio-docs
          directory: site
