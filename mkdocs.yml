site_name: TiPortfolio Docs
repo_url: https://github.com/TradeInsight-Info/TiPortfolio

theme:
  name: material
  features:
    - search.highlight
    - search.suggest
    - navigation.footer

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
  - search

extra:
  version:
    provider: mike

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

nav:
  - Home: index.md
  - CLI: cli.md
  - Built-in Strategies:
    - guides/fix-time-rebalance.md
    - guides/market-volatility-rebalance.md
    - guides/allocation-strategies.md
  - Guides:
    - Debug: debug.md
    - Usage: guides/usage.md
    - guides/key-data-types.md
    - guides/comparing-results.md
    - guides/extra-data.md
  - Why TiPortfolio:
    - about.md
    - thoughts.md
  - API:
    - Overview: api/index.md
    - Project Structure: api/structure.md
    - Reference: api/reference.md
  - Others:
    - Researching: papers.md
    - Changelog: https://github.com/TradeInsight-Info/TiPortfolio/releases
