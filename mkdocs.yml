site_name: TiPortfolio Docs
repo_url: https://github.com/TradeInsight-Info/TiPortfolio

theme:
  # name: readthedocs
  name: material
  features:
    - search.highlight
    - search.suggest
    - navigation.footer


plugins:
  - mkdocstrings
  - search
  - offline

extra:
  version:
    provider: mike

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid



nav:
  - Home: index.md
  - Built in Strategies:
    - guides/fix-time-rebalance.md
    - guides/market-volatility-rebalance.md
    - guides/allocation-strategies.md
  - Guides:
    - Debug: debug.md
    - Usage: guides/usage.md
    - guides/key-data-types.md
    - guides/comparing-results.md

  - Why TiPortfolio:
    - about.md
    - thoughts.md
    - api/structure.md
  - API:
    - api/index.md
  - Reference:
    - Researching: papers.md
  - Changelog: https://github.com/TradeInsight-Info/TiPortfolio/releases